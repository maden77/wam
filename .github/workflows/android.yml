name: Build APK Otomatis
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Proyek & Build
        run: |
          # 1. Membuat struktur proyek Flutter otomatis
          flutter create --project-name buku_catatan --platforms android .
          
          # 2. Tambahkan paket untuk simpan data di HP
          flutter pub add shared_preferences
          
          # 3. Menimpa file main.dart dengan kode yang sudah diperbaiki
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';

          void main() => runApp(NotesApp());

          class NotesApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                home: NotesScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class NotesScreen extends StatefulWidget {
            @override
            _NotesScreenState createState() => _NotesScreenState();
          }

          class _NotesScreenState extends State<NotesScreen> {
            List<String> notes = [];
            final TextEditingController _controller = TextEditingController();

            @override
            void initState() {
              super.initState();
              _loadNotes(); // Ambil catatan saat aplikasi dibuka
            }

            _loadNotes() async {
              SharedPreferences prefs = await SharedPreferences.getInstance();
              setState(() {
                notes = prefs.getStringList('my_notes') ?? [];
              });
            }

            _saveNotes() async {
              SharedPreferences prefs = await SharedPreferences.getInstance();
              await prefs.setStringList('my_notes', notes);
            }

            void addNote() {
              if (_controller.text.isNotEmpty) {
                setState(() {
                  notes.add(_controller.text);
                  _controller.clear();
                });
                _saveNotes(); // Simpan ke memori HP
              }
            }

            void deleteNote(int index) {
              setState(() {
                notes.removeAt(index);
              });
              _saveNotes(); // Update memori HP setelah hapus
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text("Buku Catatan Saya")),
                body: ListView.builder(
                  itemCount: notes.length,
                  itemBuilder: (context, index) => ListTile(
                    title: Text(notes[index]),
                    trailing: IconButton(
                      icon: Icon(Icons.delete, color: Colors.red),
                      onPressed: () => deleteNote(index),
                    ),
                  ),
                ),
                bottomSheet: Container(
                  padding: EdgeInsets.all(10),
                  color: Colors.white,
                  child: Row(
                    children: [
                      Expanded(
                        child: TextField(
                          controller: _controller,
                          decoration: InputDecoration(
                            hintText: "Tulis catatan...",
                            border: OutlineInputBorder(),
                          ),
                        ),
                      ),
                      SizedBox(width: 10),
                      FloatingActionButton(
                        onPressed: addNote,
                        child: Icon(Icons.add),
                      )
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # 4. Rakit menjadi APK
          flutter build apk --debug

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Catatan-Maden
          path: build/app/outputs/flutter-apk/app-debug.apk
